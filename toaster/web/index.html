<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TOASTER</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <header id="toolbar">
      <span class="logo">
        <svg viewBox="0 0 64 64" width="24" height="24" aria-hidden="true">
          <rect x="21" y="7" width="8" height="15" rx="2" fill="var(--accent)" />
          <rect x="34" y="5" width="8" height="17" rx="2" fill="var(--accent)" />
          <path d="M9 31 Q9 22 18 22 H46 Q55 22 55 31 V47 Q55 52 50 52 H14 Q9 52 9 47 Z"
                fill="#161616" stroke="currentColor" stroke-width="3" />
          <rect x="18" y="29" width="28" height="3.5" rx="1.7" fill="currentColor" />
          <rect x="56" y="32" width="4" height="11" rx="2" fill="currentColor" />
          <rect x="16" y="52" width="5" height="5" fill="currentColor" />
          <rect x="43" y="52" width="5" height="5" fill="currentColor" />
        </svg>
        <b>TOASTER</b>
      </span>
      <span class="sep"></span>
      <button data-act="assign">Assign</button>
      <button data-act="undo">Undo</button>
      <button data-act="redo">Redo</button>
      <button data-act="save">Save</button>
      <span class="sep"></span>
      <span class="group" id="modes"></span>
      <span class="sep"></span>
      <button data-mode-pick="point" class="toggle active">Point</button>
      <button data-mode-pick="box" class="toggle">Box</button>
      <span class="spacer"></span>
      <span id="status">loading…</span>
    </header>
    <div id="loading"><div class="bar"></div></div>

    <main>
      <div id="viewport"></div>

      <div class="window" id="win-classes" style="left: 14px; top: 52px; width: 248px">
        <div class="titlebar">Classes</div>
        <div class="body">
          <div id="classes" class="list"></div>
          <div class="row">
            <button id="cls-add">Add</button>
            <button id="cls-rename">Rename</button>
            <button id="cls-remove">Remove</button>
          </div>
        </div>
      </div>

      <div class="window" id="win-segmenter" style="left: 14px; top: 250px; width: 248px">
        <div class="titlebar">Segmenter</div>
        <div class="body">
          <select id="seg-name"></select>
          <label class="row">eps <input id="seg-eps" type="number" min="0.001" step="0.05" value="0.5" /></label>
          <label class="row">min_samples <input id="seg-ms" type="number" min="1" step="1" value="10" /></label>
          <label class="row"><input id="seg-scope" type="checkbox" checked /> On selection only</label>
          <button id="seg-run" class="primary">Run</button>
        </div>
      </div>

      <div class="window" id="win-display" style="left: 14px; top: 446px; width: 248px">
        <div class="titlebar">Display</div>
        <div class="body">
          <label class="row">Size <input id="psize" type="range" min="1" max="12" value="3" /></label>
          <label class="row"><input id="round" type="checkbox" /> Round points</label>
        </div>
      </div>

      <div class="window" id="win-groups" style="right: 14px; top: 52px; width: 256px; display: none">
        <div class="titlebar">
          <span id="groups-header">Segments</span>
          <button class="x" data-close="win-groups">×</button>
        </div>
        <div class="body grow">
          <div id="groups" class="list grow"></div>
          <div class="row">
            <button id="grp-solo">Solo</button>
            <button id="grp-showall">Show all</button>
          </div>
          <div class="row">
            <button id="grp-assign">Assign class</button>
            <button id="grp-suggested">Assign suggested</button>
          </div>
        </div>
      </div>

      <div id="rubber"></div>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
